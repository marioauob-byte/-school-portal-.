<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pannello Amministratore</title>
    <link rel="stylesheet" href="style.css">

    <!-- PWA Manifest & Service Worker -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('PWA Ready!', reg))
            .catch(err => console.log('PWA Error:', err));
        });
      }
    </script>

    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        .btn-approve { background-color: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; }
        .btn-delete { background-color: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .badge-approved { color: green; font-weight: bold; }
        .badge-pending { color: orange; font-weight: bold; }
        .form-section { background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <!-- شاشة تسجيل دخول الأدمن -->
    <div id="adminAuthSection">
        <h1>Accesso Amministratore</h1>
        <form id="adminLoginForm">
            <div>
                <label for="adminUser">Username Admin:</label><br>
                <input type="text" id="adminUser" placeholder="Inserisci username admin">
            </div>
            <br>
            <div>
                <label for="adminPass">Password Admin:</label><br>
                <input type="password" id="adminPass" placeholder="Inserisci password admin">
            </div>
            <br>
            <button type="button" id="adminLoginBtn">Accedi come Admin</button>
        </form>
    </div>

    <!-- لوحة التحكم للطلبات والمواد -->
    <div id="adminDashboardSection" style="display: none;">
        <h1>Pannello di Controllo Amministratore</h1>
        <button type="button" id="logoutBtn">Logout</button>
        <hr>

        <!-- قسم إضافة المواد للموديولات (رفع ملفات + روابط) -->
        <div class="form-section">
            <h2>➕ Aggiungi Materiale a un Modulo</h2>
            <form id="materialForm">
                <div class="form-group">
                    <label for="selectModule">Seleziona Modulo:</label>
                    <select id="selectModule">
                        <option value="">Caricamento moduli...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="matTitle">Titolo del Materiale (es. Lezione 1 / Foto Schema / Video):</label>
                    <input type="text" id="matTitle" placeholder="Inserisci titolo..." required>
                </div>

                <div class="form-group">
                    <label for="matType">Tipo di Materiale:</label>
                    <select id="matType">
                        <option value="pdf">📄 Documento / PDF / Word</option>
                        <option value="image">🖼️ Immagine / Foto</option>
                        <option value="video">🎥 Video Lezione</option>
                        <option value="link">🔗 Link Esterno / Sito Web</option>
                    </select>
                </div>

                <!-- التبديل بين رفع ملف من الجهاز أو إدخال رابط خارجي -->
                <div class="form-group">
                    <label>Metodo di Inserimento:</label>
                    <select id="uploadSource" onchange="toggleInputType()">
                        <option value="file">📁 Carica un File dal Computer / Telefono</option>
                        <option value="url">🔗 Inserisci un Link / URL Esterno (es. YouTube / Drive)</option>
                    </select>
                </div>

                <!-- خيار 1: رفع ملف من الكمبيوتر أو الهاتف -->
                <div class="form-group" id="fileGroup">
                    <label for="fileInput">Seleziona File (PDF, Foto, Video):</label>
                    <input type="file" id="fileInput" accept="image/*,video/*,.pdf,.doc,.docx,.ppt,.pptx">
                </div>

                <!-- خيار 2: رابط خارجي -->
                <div class="form-group" id="urlGroup" style="display: none;">
                    <label for="matUrl">URL del Materiale (es. Link YouTube / Drive):</label>
                    <input type="url" id="matUrl" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label for="matDesc">Descrizione o Note (Opzionale):</label>
                    <textarea id="matDesc" rows="2" placeholder="Breve descrizione per gli studenti..."></textarea>
                </div>

                <button type="button" id="addMaterialBtn" class="btn-approve">📤 Carica e Salva Materiale</button>
            </form>
        </div>

        <hr>

        <!-- قائمة المواد المضافة حالياً -->
        <h2>📚 Materiali Presenti nei Moduli</h2>
        <table>
            <thead>
                <tr>
                    <th>Modulo</th>
                    <th>Titolo</th>
                    <th>Tipo</th>
                    <th>Link / File</th>
                    <th>Azione</th>
                </tr>
            </thead>
            <tbody id="materialsBody">
                <!-- سيتم تحميل المواد هنا -->
            </tbody>
        </table>

        <hr>

        <!-- قسم طلبات التسجيل -->
        <h2>Richieste di Accesso Ricevute</h2>
        <table id="requestsTable">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Città</th>
                    <th>Motivo</th>
                    <th>Stato</th>
                    <th>Azione</th>
                </tr>
            </thead>
            <tbody id="requestsBody">
                <!-- سيتم تحميل الطلبات هنا عبر JavaScript -->
            </tbody>
        </table>
    </div>

    <br><hr>
    <p><a href="index.html">Torna alla Pagina Principale</a></p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://uqgprffqfrwxdymfwhvn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_sYYB5RXZi_UVZcZXiC7ulQ_IQuzKWO_';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const adminAuthSection = document.getElementById('adminAuthSection');
        const adminDashboardSection = document.getElementById('adminDashboardSection');

        // التبديل بين رفع ملف وإدخال رابط
        function toggleInputType() {
            const source = document.getElementById('uploadSource').value;
            if (source === 'file') {
                document.getElementById('fileGroup').style.display = 'block';
                document.getElementById('urlGroup').style.display = 'none';
            } else {
                document.getElementById('fileGroup').style.display = 'none';
                document.getElementById('urlGroup').style.display = 'block';
            }
        }

        // تسجيل دخول الأدمن
        document.getElementById('adminLoginBtn').addEventListener('click', async () => {
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value.trim();

            if (!user || !pass) {
                alert("Inserisci username e password!");
                return;
            }

            const { data: admin, error } = await _supabase
                .from('admins')
                .select('*')
                .eq('username', user)
                .eq('password', pass)
                .maybeSingle();

            if (error) {
                alert("Errore: " + error.message);
                return;
            }

            if (admin) {
                alert("Benvenuto " + admin.username + "!");
                sessionStorage.setItem('isAdminLoggedIn', 'true');
                showDashboard();
            } else {
                alert("Credenziali Admin errate!");
            }
        });

        // الخروج
        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.removeItem('isAdminLoggedIn');
            location.reload();
        });

        // التحقق من حالة الجلسة
        if (sessionStorage.getItem('isAdminLoggedIn') === 'true') {
            showDashboard();
        }

        function showDashboard() {
            adminAuthSection.style.display = 'none';
            adminDashboardSection.style.display = 'block';
            loadModulesSelect();
            loadMaterials();
            loadRequests();
        }

        // 1. تحميل قائمة الموديولات في قائمة الاختيار (Dropdown)
        async function loadModulesSelect() {
            const { data: modules, error } = await _supabase
                .from('modules')
                .select('*')
                .order('id', { ascending: true });

            if (error) return console.error(error);

            const select = document.getElementById('selectModule');
            select.innerHTML = '';
            modules.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = `${m.title}`;
                select.appendChild(opt);
            });
        }

        // 2. إضافة مادة جديدة (رفع ملف أو رابط)
        document.getElementById('addMaterialBtn').addEventListener('click', async () => {
            const btn = document.getElementById('addMaterialBtn');
            const moduleId = document.getElementById('selectModule').value;
            const title = document.getElementById('matTitle').value.trim();
            const type = document.getElementById('matType').value;
            const desc = document.getElementById('matDesc').value.trim();
            const uploadSource = document.getElementById('uploadSource').value;

            if (!moduleId || !title) {
                alert("Compila il titolo e seleziona un modulo!");
                return;
            }

            let finalUrl = '';

            // إذا تم اختيار رفع ملف من الجهاز
            if (uploadSource === 'file') {
                const fileInput = document.getElementById('fileInput');
                if (fileInput.files.length === 0) {
                    alert("Seleziona un file da caricare!");
                    return;
                }

                const file = fileInput.files[0];
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                const filePath = `materials/${fileName}`;

                btn.textContent = "⌛ Caricamento file in corso...";
                btn.disabled = true;

                // رفع الملف لـ Supabase Storage
                const { data: uploadData, error: uploadError } = await _supabase.storage
                    .from('materials')
                    .upload(filePath, file);

                if (uploadError) {
                    alert("Errore caricamento file: " + uploadError.message + "\nAssicurati di aver creato il Bucket 'materials' in Supabase!");
                    btn.textContent = "📤 Carica e Salva Materiale";
                    btn.disabled = false;
                    return;
                }

                // جلب الرابط المباشر للملف
                const { data: publicUrlData } = _supabase.storage
                    .from('materials')
                    .getPublicUrl(filePath);

                finalUrl = publicUrlData.publicUrl;
            } else {
                // إذا تم اختيار وضع رابط يدوي
                finalUrl = document.getElementById('matUrl').value.trim();
                if (!finalUrl) {
                    alert("Inserisci l'URL!");
                    return;
                }
            }

            // حفظ بيانات المادة في قاعدة البيانات
            const { error: insertError } = await _supabase
                .from('module_materials')
                .insert([{
                    module_id: moduleId,
                    title: title,
                    type: type,
                    content_url: finalUrl,
                    description: desc
                }]);

            btn.textContent = "📤 Carica e Salva Materiale";
            btn.disabled = false;

            if (insertError) {
                alert("Errore salvataggio database: " + insertError.message);
            } else {
                alert("Materiale salvato con successo!");
                document.getElementById('materialForm').reset();
                toggleInputType();
                loadMaterials();
            }
        });

        // 3. عرض المواد المضافة وحذفها
        async function loadMaterials() {
            const { data: materials, error } = await _supabase
                .from('module_materials')
                .select('*, modules(title)')
                .order('created_at', { ascending: false });

            if (error) return console.error(error);

            const tbody = document.getElementById('materialsBody');
            tbody.innerHTML = '';

            materials.forEach(mat => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${mat.modules ? mat.modules.title : 'Modulo ' + mat.module_id}</td>
                    <td><strong>${mat.title}</strong></td>
                    <td>${mat.type.toUpperCase()}</td>
                    <td><a href="${mat.content_url}" target="_blank">Apri / Visualizza</a></td>
                    <td><button class="btn-delete" onclick="deleteMaterial(${mat.id})">Elimina</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function deleteMaterial(id) {
            if (confirm("Sei sicuro di voler eliminare questo materiale?")) {
                await _supabase.from('module_materials').delete().eq('id', id);
                loadMaterials();
            }
        }

        // 4. تحميل الطلبات من Supabase
        async function loadRequests() {
            const { data: requests, error } = await _supabase
                .from('access_requests')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) return console.error(error);

            const tbody = document.getElementById('requestsBody');
            tbody.innerHTML = '';

            requests.forEach(req => {
                const date = new Date(req.created_at).toLocaleDateString('it-IT');
                const isApproved = req.status === 'approved';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${date}</td>
                    <td>${req.full_name || ''}</td>
                    <td>${req.email || ''}</td>
                    <td>${req.city || ''}</td>
                    <td>${req.reason || ''}</td>
                    <td>${isApproved ? '<span class="badge-approved">Approvato</span>' : '<span class="badge-pending">In Attesa</span>'}</td>
                    <td>
                        ${isApproved 
                            ? '<span>Utente Creato</span>' 
                            : `<button class="btn-approve" onclick="approveRequest(${req.id}, '${req.email}', '${req.full_name}')">Approva e Crea Account</button>`}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function approveRequest(reqId, email, fullName) {
            const generatedUsername = email.split('@')[0];
            const generatedPassword = Math.random().toString(36).slice(-8);

            const nextYear = new Date();
            nextYear.setFullYear(nextYear.getFullYear() + 1);
            const expiryDate = nextYear.toISOString().split('T')[0];

            const { error: studentError } = await _supabase
                .from('students')
                .insert([{
                    username: generatedUsername,
                    password: generatedPassword,
                    expiry_date: expiryDate
                }]);

            if (studentError) {
                alert("Errore creazione studente: " + studentError.message);
                return;
            }

            await _supabase
                .from('access_requests')
                .update({ status: 'approved' })
                .eq('id', reqId);

            alert(`Account creato con successo!\n\nUsername: ${generatedUsername}\nPassword: ${generatedPassword}\nScadenza: ${expiryDate}`);
            loadRequests();
        }
    </script>
</body>
</html>
