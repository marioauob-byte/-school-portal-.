<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz di Verifica - Portale Didattico</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-between">

    <!-- Header Navigation -->
    <nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 p-2 rounded-lg transition">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h1 class="text-xl font-bold tracking-wide">Test di Verifica</h1>
        </div>
        <span id="welcomeUser" class="text-sm text-slate-400"></span>
    </nav>

    <!-- Main Quiz Container -->
    <main class="max-w-3xl mx-auto px-6 py-8 w-full">
        
        <!-- Header Info Card -->
        <div class="bg-slate-800/80 border border-slate-700 p-6 rounded-2xl mb-8 flex justify-between items-center">
            <div>
                <span id="modBadge" class="text-xs text-indigo-400 font-mono font-semibold">Modulo --</span>
                <h2 id="quizTitle" class="text-2xl font-bold text-white">Caricamento domande...</h2>
            </div>
            <div class="bg-indigo-950 text-indigo-400 px-4 py-2 rounded-xl border border-indigo-800/50 text-center">
                <span class="block text-xs uppercase text-slate-400">Totale</span>
                <span id="qCount" class="font-bold text-lg">0 Domande</span>
            </div>
        </div>

        <!-- Quiz Form Area -->
        <div id="quizContainer" class="space-y-6">
            <div class="animate-pulse bg-slate-800 h-32 rounded-xl"></div>
        </div>

        <!-- Result Box (Hidden by default) -->
        <div id="resultBox" class="hidden bg-slate-800/90 border border-indigo-500 p-8 rounded-2xl text-center mt-8">
            <div id="scoreIcon" class="text-5xl mb-4">🏆</div>
            <h3 id="scoreTitle" class="text-2xl font-bold mb-2">Risultato del Test</h3>
            <p id="scoreText" class="text-xl text-slate-300 mb-6"></p>
            <button onclick="window.location.reload()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-bold transition">
                Riprova il Test
            </button>
        </div>

        <!-- Submit Button -->
        <div id="submitContainer" class="mt-8 hidden">
            <button id="submitBtn" onclick="calculateResult()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg transition">
                <i class="fa-solid fa-paper-plane mr-2"></i> Invia e Calcola Punteggio
            </button>
        </div>

    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-800 py-6 text-center text-sm text-slate-500">
        <p>Portale Didattico IT &copy; 2026</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://uqgprffqfrwxdymfwhvn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_sYYB5RXZi_UVZcZXiC7ulQ_IQuzKWO_';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const currentUser = JSON.parse(localStorage.getItem('loggedInUser'));
        if (!currentUser) {
            window.location.href = "index.html";
        } else {
            document.getElementById('welcomeUser').textContent = "Studente: " + currentUser.username;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const moduleId = urlParams.get('id');

        let questionsData = [];

        async function loadQuiz() {
            if (!moduleId) return;

            // Fetch Module Info
            const { data: mod } = await _supabase.from('modules').select('*').eq('id', moduleId).single();
            if (mod) {
                document.getElementById('modBadge').textContent = "Modulo " + mod.id;
                document.getElementById('quizTitle').textContent = mod.title;
            }

            // Fetch Questions
            const { data: questions, error } = await _supabase
                .from('quizzes')
                .select('*')
                .eq('module_id', moduleId);

            if (error || !questions || questions.length === 0) {
                document.getElementById('quizContainer').innerHTML = `
                    <div class="bg-slate-800/50 p-8 rounded-xl text-center text-slate-400">
                        <i class="fa-solid fa-circle-info text-3xl text-indigo-400 mb-3"></i>
                        <p>Non ci sono ancora domande disponibili per questo modulo.</p>
                    </div>`;
                return;
            }

            questionsData = questions;
            document.getElementById('qCount').textContent = questions.length + " Domande";
            document.getElementById('submitContainer').classList.remove('hidden');

            // Render Questions
            document.getElementById('quizContainer').innerHTML = questions.map((q, idx) => `
                <div class="bg-slate-800/60 border border-slate-700/70 p-6 rounded-xl space-y-4">
                    <p class="font-semibold text-lg text-indigo-200">${idx + 1}. ${q.question}</p>
                    <div class="space-y-2">
                        ${renderOption(q.id, 'A', q.option_a)}
                        ${renderOption(q.id, 'B', q.option_b)}
                        ${renderOption(q.id, 'C', q.option_c)}
                        ${renderOption(q.id, 'D', q.option_d)}
                    </div>
                </div>
            `).join('');
        }

        function renderOption(qId, key, text) {
            return `
                <label class="flex items-center gap-3 bg-slate-900/60 hover:bg-slate-900 border border-slate-700/50 p-3 rounded-lg cursor-pointer transition">
                    <input type="radio" name="q_${qId}" value="${key}" class="w-4 h-4 text-indigo-600">
                    <span class="text-sm text-slate-300"><strong class="text-indigo-400">${key})</strong> ${text}</span>
                </label>`;
        }

        function calculateResult() {
            let score = 0;
            let answered = 0;

            questionsData.forEach(q => {
                const selected = document.querySelector(`input[name="q_${q.id}"]:checked`);
                if (selected) {
                    answered++;
                    if (selected.value === q.correct_option) {
                        score++;
                    }
                }
            });

            if (answered < questionsData.length) {
                if (!confirm('Non hai risposto a tutte le domande. Vuoi inviare comunque?')) return;
            }

            // Hide questions & submit button, show result
            document.getElementById('quizContainer').classList.add('hidden');
            document.getElementById('submitContainer').classList.add('hidden');

            const resultBox = document.getElementById('resultBox');
            resultBox.classList.remove('hidden');

            const percentage = Math.round((score / questionsData.length) * 100);
            document.getElementById('scoreText').innerHTML = `Hai risposto correttamente a <strong class="text-emerald-400">${score}</strong> su <strong class="text-white">${questionsData.length}</strong> domande (${percentage}%).`;

            if (percentage >= 60) {
                document.getElementById('scoreIcon').textContent = '🎉';
                document.getElementById('scoreTitle').textContent = 'Complimenti! Esame Superato!';
            } else {
                document.getElementById('scoreIcon').textContent = '❌';
                document.getElementById('scoreTitle').textContent = 'Non Superato, Riprova!';
            }
        }

        loadQuiz();
    </script>
</body>
</html>
